<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video y Ubicación con Bootstrap</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="Css/style.css">

</head>
<body>

    <div class="container my-5">

        <div class="row g-4">
            
            <div class="col-md-6">
                <h2 class="mb-3">Opening de Tokyo ghoul</h2>
                <div class="ratio ratio-16x9 shadow border border-danger border-3 rounded overflow-hidden">
                    <iframe 
                        src="https://www.youtube.com/embed/7aMOurgDB-o?si=RGHfjvJaFsynKJBO" 
                        title="YouTube video player" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="col-md-6">
                <h2 class="mb-3">Ubicación de la UNPHU</h2>
                <div class="ratio ratio-16x9 shadow border border-danger border-3 rounded overflow-hidden">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3784.184348270529!2d-69.95090892395646!3d18.4858129825959!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8eaf89f362e578d3%3A0x19d59fe09af95898!2sUniversidad%20Nacional%20Pedro%20Henr%C3%ADquez%20Ure%C3%B1a%20(UNPHU)!5e0!3m2!1ses!2sdo!4v1719000000000!5m2!1ses!2sdo" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>

        </div> <hr class="border-secondary my-5">

        <h3 class="mb-4">Expedientes de Facciones (Pasa el mouse encima)</h3>
        <div class="row g-3">
            <div class="col-md-6">
                <div class="tarjeta-hover-bando p-4 rounded text-center border border-secondary" id="bando-anteiku">
                    <h4 class="text-light m-0">Facción: Anteiku</h4>
                    <p class="text-muted mt-2 m-0 small">Ghouls pacíficos que buscan la convivencia armónica.</p>
                </div>
            </div>

            <div class="col-md-6">
                <div class="tarjeta-hover-bando p-4 rounded text-center border border-secondary" id="bando-ccg">
                    <h4 class="text-light m-0">Facción: CCG</h4>
                    <p class="text-muted mt-2 m-0 small">Fuerzas de contención y protección de la humanidad.</p>
                </div>
            </div>
        </div>

        <hr class="border-secondary my-5">

        <div class="enlaces-footer py-2">
            <a href="https://maps.google.com/?cid=1861517616616430488" target="_blank" class="btn btn-outline-danger btn-sm me-2">Ver en Google Maps</a>
            <a href="mailto:ejemplo@correo.com" class="btn btn-outline-light btn-sm me-2">Enviar Correo</a>
            <a href="index.html" class="btn btn-outline-secondary btn-sm">Volver</a>
        </div>

        <script src="javascript/javascript.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


</body>
</html>
